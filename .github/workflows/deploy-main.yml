name: Deploy main Branch to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_MAIN_HOST_IP }}
          username: github_user
          key: ${{ secrets.SSH_MAIN_PRIVATE_KEY }}
          script: |
            cd /home/github_user/workspace/ILLA-RAG
            git checkout main
            git pull
            sudo systemctl restart illa-rag.service
            echo "Waiting..."
            sleep 20

            for i in {1..6}; do
              if ss -tuln | grep -q ':8501'; then
                echo "✅ Port 8501 is now active."
                break
              else
                echo "⏳ Port 8501 not ready yet. Retrying in 5 seconds..."
                sleep 5
              fi
            done

            if ! ss -tuln | grep -q ':8501'; then
              echo "❌ Service failed to start on port 8501"
              exit 1
            fi
